name: CI

on:
  push:
    branches: [main, dev]
  pull_request:
    branches: [main, dev]

jobs:
  build-test:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install Zig 0.13.0
        run: |
          set -euo pipefail
          curl -fsSL -o /tmp/zig.tar.xz \
            "https://ziglang.org/download/0.13.0/zig-linux-x86_64-0.13.0.tar.xz"
          sudo tar -C /usr/local -xf /tmp/zig.tar.xz
          echo "/usr/local/zig-linux-x86_64-0.13.0" >> "$GITHUB_PATH"

      - name: Build and test
        run: |
          zig version
          zig build -Doptimize=ReleaseSafe -Dcpu=baseline
          zig build test -Dcpu=baseline
          ./zig-out/bin/flint version
          ./zig-out/bin/flint doctor
          ./zig-out/bin/flint skills
          ./zig-out/bin/flint strike document.artifacts document.artifacts.route echo
          FLINT_SKILLS_DIR=zig-out/skills ./zig-out/bin/flint strike document.artifacts document.artifacts.route echo_skill
