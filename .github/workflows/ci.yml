name: CI

on:
  push:
    branches: [main, dev]
  pull_request:
    branches: [main, dev]

permissions:
  contents: read

jobs:
  build-test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install Zig
        uses: mlugg/setup-zig@v1
        with:
          version: 0.13.0

      - name: Build
        run: zig build -Doptimize=ReleaseSafe

      - name: Test
        run: zig build test

      - name: Smoke CLI
        run: |
          ./zig-out/bin/flint version
          ./zig-out/bin/flint doctor
          ./zig-out/bin/flint strike document.artifacts document.artifacts.route
